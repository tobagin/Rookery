name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build release binaries
        run: make cross
      - name: Checksums
        run: |
          cd dist
          sha256sum rookery-linux-amd64 rookery-linux-arm64 > SHA256SUMS
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/rookery-linux-amd64
            dist/rookery-linux-arm64
            dist/SHA256SUMS
