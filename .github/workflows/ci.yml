name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: gofmt
        run: make fmt
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
      - name: build (amd64 + arm64)
        run: make cross
